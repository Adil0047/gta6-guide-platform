services:
  - type: web
    name: gta6-guide-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm build:api
    startCommand: pnpm --filter @gta6-guide/api start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_BASE_URL
        value: /api/v1
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_COOKIE_NAME
        value: gta6_refresh_token
      - key: CSRF_COOKIE_NAME
        value: gta6_csrf_token
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 300
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: 30
      - key: LOG_LEVEL
        value: info
